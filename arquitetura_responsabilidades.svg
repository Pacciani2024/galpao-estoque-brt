<svg viewBox="0 0 940 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>Arquitetura de Responsabilidades — MeEventos, BRT Desenrola, Galpão e Kira</title>
  <desc>Um dado tem um dono. MeEventos é o contrato, Galpão é a mão (estoque físico), BRT Desenrola é a cabeça (decisão), Kira é a voz. Cada sistema expõe sua verdade por API ou webhook; os outros leem, mas não reescrevem.</desc>
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7280"/>
    </marker>
    <style>
      .box{ fill:#f4f4f5; stroke:#d4d4d8; stroke-width:1.5; }
      .brain{ fill:#eef2ff; stroke:#c7d2fe; stroke-width:2; }
      .t{ fill:#18181b; }
      .s{ fill:#6b7280; }
      .role{ fill:#6b7280; font-style:italic; }
      .edge{ stroke:#6b7280; stroke-width:1.6; fill:none; }
    </style>
  </defs>
  <text x="470" y="34" text-anchor="middle" class="t" font-size="20" font-weight="700">Arquitetura de Responsabilidades</text>
  <text x="470" y="56" text-anchor="middle" class="s" font-size="13">Um dado tem um dono — os outros leem por API/webhook, nunca reescrevem</text>
  <rect class="box" x="30" y="150" width="180" height="120" rx="12"/>
  <text x="120" y="180" text-anchor="middle" class="t" font-size="16" font-weight="700">MeEventos</text>
  <text x="120" y="199" text-anchor="middle" class="role" font-size="12">o contrato</text>
  <text x="120" y="224" text-anchor="middle" class="s" font-size="11">dono de:</text>
  <text x="120" y="242" text-anchor="middle" class="s" font-size="11">evento · itens vendidos</text>
  <text x="120" y="258" text-anchor="middle" class="s" font-size="11">data · orçamento</text>
  <rect class="brain" x="380" y="120" width="200" height="180" rx="12"/>
  <text x="480" y="150" text-anchor="middle" class="t" font-size="16" font-weight="700">BRT Desenrola</text>
  <text x="480" y="169" text-anchor="middle" class="role" font-size="12">a cabeça</text>
  <text x="480" y="194" text-anchor="middle" class="s" font-size="11">dono de:</text>
  <text x="480" y="212" text-anchor="middle" class="s" font-size="11">reservas · sublocação</text>
  <text x="480" y="228" text-anchor="middle" class="s" font-size="11">Trello · financeiro</text>
  <text x="480" y="244" text-anchor="middle" class="s" font-size="11">frota · WhatsApp/Kira</text>
  <text x="480" y="276" text-anchor="middle" class="s" font-size="10.5">consulta o galpão por ID</text>
  <rect class="box" x="750" y="150" width="160" height="120" rx="12"/>
  <text x="830" y="180" text-anchor="middle" class="t" font-size="16" font-weight="700">Kira</text>
  <text x="830" y="199" text-anchor="middle" class="role" font-size="12">a voz</text>
  <text x="830" y="224" text-anchor="middle" class="s" font-size="11">responde no WhatsApp</text>
  <text x="830" y="242" text-anchor="middle" class="s" font-size="11">resumo · alerta</text>
  <text x="830" y="258" text-anchor="middle" class="s" font-size="11">orientação da equipe</text>
  <rect class="box" x="380" y="390" width="200" height="150" rx="12"/>
  <text x="480" y="420" text-anchor="middle" class="t" font-size="16" font-weight="700">Galpão</text>
  <text x="480" y="439" text-anchor="middle" class="role" font-size="12">a mão (realidade física)</text>
  <text x="480" y="464" text-anchor="middle" class="s" font-size="11">dono de:</text>
  <text x="480" y="482" text-anchor="middle" class="s" font-size="11">estoque físico · QR</text>
  <text x="480" y="498" text-anchor="middle" class="s" font-size="11">manutenção · separação</text>
  <text x="480" y="514" text-anchor="middle" class="s" font-size="11">conferência · pendências</text>
  <rect class="box" x="760" y="330" width="150" height="60" rx="10"/>
  <text x="835" y="356" text-anchor="middle" class="t" font-size="13" font-weight="600">Trello</text>
  <text x="835" y="374" text-anchor="middle" class="s" font-size="10.5">pipeline operacional</text>
  <path class="edge" d="M210,205 L378,205" marker-end="url(#arw)"/>
  <text x="294" y="196" text-anchor="middle" class="s" font-size="10.5">eventos + itens (ID)</text>
  <path class="edge" d="M580,205 L748,205" marker-end="url(#arw)"/>
  <text x="664" y="196" text-anchor="middle" class="s" font-size="10.5">decisão / orientação</text>
  <path class="edge" d="M580,265 C660,300 700,320 758,345" marker-end="url(#arw)"/>
  <text x="700" y="300" text-anchor="middle" class="s" font-size="10">move card</text>
  <path class="edge" d="M455,300 L455,388" marker-end="url(#arw)"/>
  <text x="368" y="348" text-anchor="end" class="s" font-size="10.5">consulta /stock (ID)</text>
  <path class="edge" d="M505,388 L505,300" marker-end="url(#arw)"/>
  <text x="592" y="348" text-anchor="start" class="s" font-size="10.5">webhooks de bipagem</text>
  <line x1="30" y1="562" x2="910" y2="562" stroke="#e4e4e7" stroke-width="1"/>
  <text x="30" y="582" class="s" font-size="11">Regras: casa por ID do MeEventos (nome só como rede) · sem match não automatiza · galpão não decide, BRT não altera físico · cada um degrada sozinho.</text>
</svg>
